<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Celebrities List - CRUD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: relative;
        }
        .verified { color: green; font-weight: bold; }
        .not-verified { color: red; font-weight: bold; }
        h2 { margin-bottom: 5px; }
        button { margin-right: 5px; }
        form { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);}
        input, select { margin: 5px 0; padding: 5px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kollywood Celebrities</h1>

    <!-- Add / Modify Form -->
    <form id="celebrityForm">
        <h3 id="formTitle">Add Celebrity</h3>
        <input type="hidden" id="celebrityId">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="username" placeholder="Username">
        <input type="text" id="profession" placeholder="Profession" required>
        <input type="number" id="followers" placeholder="Followers in Millions" required>
        <select id="verified">
            <option value="true">Verified</option>
            <option value="false">Not Verified</option>
        </select>
        <input type="text" id="movies" placeholder="Famous Movies (comma separated)">
        <button type="submit">Save</button>
        <button type="button" id="cancelEdit" style="display:none;">Cancel</button>
    </form>

    <div id="celebs"></div>
</div>

<script>
let celebrities = []; // in-memory data

// Fetch JSON
async function fetchCelebrities() {
    try {
        const response = await fetch("./data1.json");
        const data = await response.json();
        celebrities = data.celebrities;
        renderCelebrities();
    } catch (error) {
        console.error("Error fetching data:", error);
    }
}

// Render all celebrities
function renderCelebrities() {
    const container = document.getElementById("celebs");
    container.innerHTML = "";
    celebrities.forEach((celeb, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h2>${celeb.name}</h2>
            <p><strong>Profession:</strong> ${celeb.profession || "N/A"}</p>
            <p><strong>Username:</strong> ${celeb.username || "N/A"}</p>
            <p><strong>Followers:</strong> ${celeb.followersInMillions || 0} Million</p>
            <p><strong>Verified:</strong> 
                <span class="${celeb.verified ? 'verified' : 'not-verified'}">
                    ${celeb.verified ? "Yes ✔" : "No ❌"}
                </span>
            </p>
            ${celeb.famousMovies ? `<p><strong>Famous Movies:</strong> ${celeb.famousMovies.join(", ")}</p>` : ""}
            <button onclick="editCelebrity(${index})">Edit</button>
            <button onclick="deleteCelebrity(${index})">Delete</button>
            <hr>
        `;
        container.appendChild(card);
    });
}

// Delete
function deleteCelebrity(index) {
    if(confirm("Are you sure you want to delete this celebrity?")) {
        celebrities.splice(index, 1);
        renderCelebrities();
    }
}

// Edit
function editCelebrity(index) {
    const celeb = celebrities[index];
    document.getElementById("formTitle").innerText = "Edit Celebrity";
    document.getElementById("celebrityId").value = index;
    document.getElementById("name").value = celeb.name;
    document.getElementById("username").value = celeb.username || "";
    document.getElementById("profession").value = celeb.profession;
    document.getElementById("followers").value = celeb.followersInMillions;
    document.getElementById("verified").value = celeb.verified;
    document.getElementById("movies").value = celeb.famousMovies ? celeb.famousMovies.join(", ") : "";
    document.getElementById("cancelEdit").style.display = "inline";
}

// Cancel Edit
document.getElementById("cancelEdit").addEventListener("click", () => {
    document.getElementById("celebrityForm").reset();
    document.getElementById("formTitle").innerText = "Add Celebrity";
    document.getElementById("celebrityId").value = "";
    document.getElementById("cancelEdit").style.display = "none";
});

// Add / Update Form Submit
document.getElementById("celebrityForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const index = document.getElementById("celebrityId").value;
    const newCeleb = {
        name: document.getElementById("name").value,
        username: document.getElementById("username").value,
        profession: document.getElementById("profession").value,
        followersInMillions: parseFloat(document.getElementById("followers").value),
        verified: document.getElementById("verified").value === "true",
        famousMovies: document.getElementById("movies").value ? document.getElementById("movies").value.split(",").map(m => m.trim()) : []
    };

    if(index === "") {
        celebrities.push(newCeleb);
    } else {
        celebrities[index] = newCeleb;
    }

    document.getElementById("celebrityForm").reset();
    document.getElementById("formTitle").innerText = "Add Celebrity";
    document.getElementById("celebrityId").value = "";
    document.getElementById("cancelEdit").style.display = "none";
    renderCelebrities();
});

// Initial load
fetchCelebrities();
</script>

</body>
</html>
