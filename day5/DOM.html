<!DOCTYPE html>
<html>
<head>
    <title>DOM Tasks Combined</title>
    <style>
    .product-card { padding:10px; margin:5px; }
    .menu li { padding:5px; }
    .highlight { background: yellow; }
    .dark-mode { background:#222; color:white; }
    .card { border:1px solid #ccc; padding:10px; margin:5px; }
    .modal-overlay {
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.5);
        display:flex;
        align-items:center;
        justify-content:center;
    }
    .modal {
        background:white;
        padding:20px;
        border-radius:5px;
    }
    .swatch {
        width:40px; height:40px;
        display:inline-block;
        cursor:pointer;
        margin:5px;
    }
    #sortable li { cursor:grab; padding:5px; border:1px solid #ddd; margin:3px; }
</style>
</head>
<body>

<h1 id="header-title">Old Title</h1>

<div class="product-card">Product 1</div>
<div class="product-card">Product 2</div>

<ul class="menu">
    <li>Home</li>
    <li>About</li>
</ul>

<div id="controls"></div>

<div id="cart"></div>

<img class="avatar" src="https://via.placeholder.com/100" width="100">

<div class="article-body">
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
</div>

<button id="theme-toggle">Toggle Theme</button>

<div class="card">
    Card 1
    <button data-action="delete">Delete</button>
</div>

<hr>

<h3>Todo List</h3>
<div id="todo-container"></div>

<hr>

<h3>Users List (Event Delegation)</h3>
<ul id="users-list">
    <li data-user-id="101">John</li>
    <li data-user-id="102">Alice</li>
</ul>

<hr>

<h3>Counter</h3>
<button id="minus">-1</button>
<span id="count">0</span>
<button id="plus">+1</button>

<hr>

<h3>Search Countries</h3>
<input id="search" placeholder="Search country...">
<ul>
    <li class="country">India</li>
    <li class="country">Canada</li>
    <li class="country">Brazil</li>
</ul>

<hr>

<h3>Color Picker</h3>
<div class="swatch" data-color="#e74c3c" style="background:#e74c3c"></div>
<div class="swatch" data-color="#3498db" style="background:#3498db"></div>
<div class="swatch" data-color="#2ecc71" style="background:#2ecc71"></div>

<hr>

<h3>Sortable List</h3>
<ul id="sortable">
    <li draggable="true">Item 1</li>
    <li draggable="true">Item 2</li>
    <li draggable="true">Item 3</li>
</ul>

<hr>

<button id="open-modal">Open Modal</button>

<script>

/* 1 */
document.getElementById("header-title").textContent = "My Awesome Page";

/* 2 */
document.querySelectorAll(".product-card").forEach(card => {
    card.style.border = "2px solid red";
});

/* 3 */
document.querySelectorAll("ul.menu li").forEach(li => {
    li.style.backgroundColor = "lightblue";
});

/* 4 */
const newBtn = document.createElement("button");
newBtn.textContent = "Click me!";
document.getElementById("controls").appendChild(newBtn);

/* 5 */
const itemDiv = document.createElement("div");
itemDiv.className = "item";
itemDiv.innerHTML = `<span>Apple</span><button>Remove</button>`;
document.getElementById("cart").appendChild(itemDiv);

/* 6 */
document.querySelector("img.avatar").src =
"https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d";

/* 7 */
document.querySelectorAll(".article-body > p").forEach(p => {
    p.classList.add("highlight");
});

/* 8 */
document.getElementById("theme-toggle")
.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
});

/* 9 */
document.querySelectorAll('button[data-action="delete"]')
.forEach(btn => {
    btn.addEventListener("click", function () {
    this.closest(".card").remove();
});
});

/* 10 Todo */
const input = document.createElement("input");
const addBtn = document.createElement("button");
const ul = document.createElement("ul");

addBtn.textContent = "Add";
document.getElementById("todo-container").append(input, addBtn, ul);

addBtn.addEventListener("click", () => {
    if (!input.value.trim()) return;

    const li = document.createElement("li");
    li.textContent = input.value;

    const delBtn = document.createElement("button");
    delBtn.textContent = " Delete";

    delBtn.addEventListener("click", () => li.remove());

    li.appendChild(delBtn);
    ul.appendChild(li);
    input.value = "";
});

/* 11 Event Delegation */
document.getElementById("users-list")
.addEventListener("click", function(e){
    if(e.target.tagName === "LI"){
        console.log("Clicked user ID:", e.target.dataset.userId);
}
});

/* 12 Counter */
let count = 0;
const countSpan = document.getElementById("count");

document.getElementById("plus").onclick = () => {
    count++;
    countSpan.textContent = count;
};

document.getElementById("minus").onclick = () => {
    if(count > 0){
        count--;
        countSpan.textContent = count;
}
};

/* 13 Live Filter */
document.getElementById("search")
.addEventListener("input", function(){
    const value = this.value.toLowerCase();
        document.querySelectorAll("li.country")
        .forEach(li => {
    li.style.display =
        li.textContent.toLowerCase().includes(value)
        ? ""
        : "none";
});
});

/* 14 Color Picker */
document.querySelectorAll(".swatch")
.forEach(swatch => {
    swatch.addEventListener("click", function(){
        document.body.style.backgroundColor = this.dataset.color;
});
});

/* 15 Sortable */
const sortable = document.getElementById("sortable");
let draggedItem = null;

sortable.addEventListener("dragstart", e => {
    draggedItem = e.target;
});

sortable.addEventListener("dragover", e => {
    e.preventDefault();
});

sortable.addEventListener("drop", e => {
    e.preventDefault();
    if(e.target.tagName === "LI"){
        sortable.insertBefore(draggedItem, e.target.nextSibling);
}
});

/* 16 Modal */
document.getElementById("open-modal")
.addEventListener("click", () => {

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";

    const modal = document.createElement("div");
    modal.className = "modal";

modal.innerHTML = `
    <h2>Modal Title</h2>
    <p>This is a modal dialog.</p>
    <button id="close-modal">Close</button>
`;

    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    overlay.addEventListener("click", e => {
        if(e.target === overlay || e.target.id === "close-modal"){
        overlay.remove();
    }
});
});

</script>

</body>
</html>
